<!doctype html>
<html lang="zh-Hant-HK">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>依附地形圖 · Attachment Topography</title>
<meta name="description" content="書識圈《Secure》讀書會工具：看看你在不同關係中的依附位置，理解大腦如何因應眼前的人與環境改變。">
<meta property="og:title" content="依附地形圖 · Attachment Topography">
<meta property="og:description" content="同一個人，在不同關係裏可能落在不同的依附位置。畫出你的依附地形圖，為《Secure》讀書會作準備。">
<meta property="og:type" content="website">
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Ccircle cx='8' cy='23' r='4.5' fill='%232f6e60'/%3E%3Cpath d='M12 21 C 17 8, 27 8, 28 14 C 29 20, 21 25, 14 23' fill='none' stroke='%232f6e60' stroke-width='2.5' stroke-linecap='round'/%3E%3C/svg%3E">
<link rel="stylesheet" href="css/style.css">
</head>
<body>
<div class="wrap">

<header class="app">
  <h1><a href="#" id="homeLink" style="color:inherit;text-decoration:none" data-i18n="app.title">依附地形圖</a></h1>
  <span class="sub" data-i18n="app.club">書識圈 Bookfort ·《Secure》讀書會</span>
  <button id="langBtn" type="button" data-i18n="btn.lang">EN</button>
  <button id="themeBtn" type="button" data-i18n="btn.theme">🌗 深／淺色</button>
</header>

<nav class="tabs" role="tablist">
  <button role="tab" data-view="home" aria-selected="false" data-i18n="nav.quiz">測驗</button>
  <button role="tab" data-view="map" aria-selected="false" data-i18n="nav.map">地形圖</button>
  <button role="tab" data-view="records" aria-selected="false" data-i18n="nav.records">紀錄</button>
  <button role="tab" data-view="collab" aria-selected="false" data-i18n-aria="nav.collabAria">
    <span class="nav-collab-long" data-i18n="nav.collab">合作評估</span>
    <span class="nav-collab-short" data-i18n="nav.collabShort">合作</span>
  </button>
</nav>

<!-- ═════════ 歡迎頁 · Landing ═════════ -->
<section id="view-landing">
  <div class="card hero">
    <div class="hero-grid">
      <p class="eyebrow" data-i18n="landing.eyebrow"></p>
      <h2 class="herotitle" data-i18n="landing.title"></h2>
      <figure class="hero-route">
        <svg viewBox="0 0 360 250" aria-hidden="true">
          <g class="route-contours">
            <path d="M20 54c54-40 114-38 160-6s104 35 160-4"/>
            <path d="M12 86c64-35 122-28 166 2s104 31 170-2"/>
            <path d="M18 206c58 28 116 24 158-8s104-36 166-4"/>
          </g>
          <circle class="route-base-ring" cx="54" cy="176" r="20"/>
          <circle class="route-base" cx="54" cy="176" r="7"/>
          <path class="route-line" d="M62 171C108 116 177 86 247 104c64 16 65 72 11 92-59 22-139 5-194-15"/>
          <circle class="route-station" cx="248" cy="104" r="6"/>
        </svg>
        <figcaption data-i18n="landing.routeCaption"></figcaption>
      </figure>
      <p class="muted hero-body" data-i18n="landing.body"></p>
      <div class="axis-pair" aria-label="questionnaire dimensions">
        <div><span class="axis-mark">X</span><span data-i18n="landing.axisAnxiety"></span></div>
        <div><span class="axis-mark">Y</span><span data-i18n="landing.axisAvoidance"></span></div>
      </div>
      <p class="hero-actions">
        <button class="primary js-start-quiz" id="landingStart" type="button" data-i18n="landing.start"></button>
        <button class="ghost hide" id="landingMap" type="button" data-i18n="landing.viewMap"></button>
      </p>
    </div>
  </div>
  <div class="card frame-card" id="attachmentFrame">
    <h2 data-i18n="landing.frameTitle"></h2>
    <p class="muted frame-intro" data-i18n="landing.frameIntro"></p>
    <div class="frame-grid">
      <article class="frame-path frame-alarm">
        <p class="path-kicker" data-i18n="landing.pathAlarmKicker"></p>
        <h3 data-i18n="landing.pathAlarmTitle"></h3>
        <div class="path-nodes" role="list">
          <span role="listitem" data-i18n="landing.pathAlarm1"></span>
          <span role="listitem" data-i18n="landing.pathAlarm2"></span>
          <span role="listitem" data-i18n="landing.pathAlarm3"></span>
        </div>
        <p data-i18n="landing.pathAlarmBody"></p>
      </article>
      <article class="frame-path frame-safety">
        <p class="path-kicker" data-i18n="landing.pathSafetyKicker"></p>
        <h3 data-i18n="landing.pathSafetyTitle"></h3>
        <div class="path-nodes" role="list">
          <span role="listitem" data-i18n="landing.pathSafety1"></span>
          <span role="listitem" data-i18n="landing.pathSafety2"></span>
          <span role="listitem" data-i18n="landing.pathSafety3"></span>
        </div>
        <p data-i18n="landing.pathSafetyBody"></p>
      </article>
    </div>
    <p class="same-person" data-i18n="landing.samePerson"></p>
    <p class="tiny frame-note" data-i18n="landing.frameNote"></p>
  </div>
  <div class="card purpose-section">
    <h2 data-i18n="landing.invitationTitle"></h2>
    <p class="muted" data-i18n="landing.invitationBody"></p>
    <div class="purpose-grid">
      <article class="purpose-card purpose-prepare">
        <span class="purpose-no">01</span>
        <h3 data-i18n="landing.routePrepareTitle"></h3>
        <p data-i18n="landing.routePrepareBody"></p>
        <button class="primary js-start-quiz" id="routeStart" type="button" data-i18n="landing.routePrepareCta"></button>
      </article>
      <article class="purpose-card">
        <span class="purpose-no">02</span>
        <h3 data-i18n="landing.routeClubTitle"></h3>
        <p data-i18n="landing.routeClubBody"></p>
        <a class="buttonlink ghost" href="https://www.instagram.com/reel/DaHcPUuOLx7" target="_blank" rel="noopener noreferrer" data-i18n="landing.clubCta"></a>
      </article>
      <article class="purpose-card">
        <span class="purpose-no">03</span>
        <h3 data-i18n="landing.routeBookTitle"></h3>
        <p data-i18n="landing.routeBookBody"></p>
        <a class="buttonlink ghost" href="https://amirlevinemd.com/books/secure/" target="_blank" rel="noopener noreferrer" data-i18n="landing.bookCta"></a>
      </article>
    </div>
  </div>
  <div class="card privacy-card">
    <h2 data-i18n="landing.privacyTitle"></h2>
    <p class="privacy-lead" data-i18n-html="landing.privacyLead"></p>
    <details id="privacyDetails">
      <summary data-i18n="landing.privacyMore"></summary>
      <p class="muted" data-i18n-html="landing.privacyBody"></p>
    </details>
    <p class="tiny" data-i18n="landing.disclaimer"></p>
  </div>
</section>

<!-- ═════════ 測驗首頁 · Quiz home ═════════ -->
<section id="view-home" class="hide">
  <div class="card">
    <h2 data-i18n="home.title"></h2>
    <p class="muted" data-i18n-html="home.body"></p>
    <h3 data-i18n="home.q1"></h3>
    <div class="mode-grid" id="quizModes"></div>
    <div id="nameRow" class="identity-panel hide">
      <div class="field-coordinate" data-i18n="home.personCoordinate"></div>
      <div class="field-label-row">
        <label for="personName" data-i18n="home.q2"></label>
        <span class="required-tag" data-i18n="form.required"></span>
      </div>
      <input type="text" id="personName" maxlength="20" data-i18n-ph="home.namePh" autocomplete="off"
        aria-required="true" aria-describedby="nameHint nameError">
      <p class="tiny field-hint" id="nameHint" data-i18n="home.nameHint"></p>
      <p class="field-error hide" id="nameError" role="alert" data-i18n="home.nameRequired"></p>
    </div>
    <div id="existingRow" class="hide">
      <h3 data-i18n="home.retestTitle"></h3>
      <div class="chiprow" id="existingPeople"></div>
    </div>
    <p><button class="primary" id="startBtn" type="button" data-i18n="home.start"></button></p>
  </div>
  <div class="card snapshot-card">
    <h2 data-i18n="home.stylesTitle"></h2>
    <div class="snapshot-markers" role="list">
      <div class="snapshot-marker" role="listitem"><span>01</span><strong data-i18n="home.markerRelationship"></strong></div>
      <div class="snapshot-marker" role="listitem"><span>02</span><strong data-i18n="home.markerNow"></strong></div>
      <div class="snapshot-marker" role="listitem"><span>03</span><strong data-i18n="home.markerMove"></strong></div>
    </div>
    <p class="tiny" data-i18n="home.stylesNote"></p>
  </div>
</section>

<!-- ═════════ 作答 · Quiz ═════════ -->
<section id="view-quiz" class="hide">
  <div class="card">
    <p class="tiny" id="quizWho"></p>
    <div class="progress"><div id="pbar" style="width:0%"></div></div>
    <p class="tiny" id="qnum"></p>
    <p class="tiny" id="quizReminder"></p>
    <div class="question-stage" id="questionStage">
      <p class="qtext" id="qtext"></p>
    </div>
    <div class="scale" id="scale7"></div>
    <div class="anchors"><span data-i18n="quiz.anchorLow"></span><span data-i18n="quiz.anchorMid"></span><span data-i18n="quiz.anchorHigh"></span></div>
    <p class="scalelabel" id="scaleLabel">&nbsp;</p>
    <div class="quiznav">
      <button class="ghost" id="prevBtn" type="button" data-i18n="quiz.prev"></button>
      <button class="ghost" id="quitBtn" type="button" data-i18n="quiz.quit"></button>
    </div>
  </div>
</section>

<!-- ═════════ 結果 · Result ═════════ -->
<section id="view-result" class="hide">
  <div class="card" id="resultCard"></div>
  <div class="card">
    <h2 data-i18n="result.chartTitle"></h2>
    <div class="chartbox" id="resultChart"></div>
    <p class="tiny" data-i18n="result.chartNote"></p>
    <p><button class="primary" id="toMapBtn" type="button" data-i18n="result.viewMap"></button>
       <button class="ghost" id="againBtn" type="button" data-i18n="result.again"></button></p>
  </div>
</section>

<!-- ═════════ 地形圖 · Map ═════════ -->
<section id="view-map" class="hide">
  <div class="card">
    <h2 data-i18n="map.title"></h2>
    <p class="muted" data-i18n="map.body"></p>
    <div class="legend" id="legend"></div>
    <div class="chartbox" id="mapChart"></div>
    <div class="pointinfo hide" id="pointInfo"></div>
    <p id="mapActions"><button class="ghost" id="mapImgBtn" type="button" data-i18n="map.saveImg"></button></p>
    <p class="tiny" data-i18n="map.bookTip"></p>
  </div>
</section>

<!-- ═════════ 紀錄 · Records ═════════ -->
<section id="view-records" class="hide">
  <div class="card">
    <h2 data-i18n="records.title"></h2>
    <div id="recordsBody"></div>
  </div>
  <div class="card">
    <h2 data-i18n="records.backupTitle"></h2>
    <p class="muted" data-i18n-html="records.backupBody"></p>
    <p>
      <button class="primary" id="exportBtn" type="button" data-i18n="records.export"></button>
      <button class="ghost" id="importBtn" type="button" data-i18n="records.import"></button>
      <input type="file" id="importFile" accept="application/json,.json" class="hide">
    </p>
    <p class="tiny" id="dataStats"></p>
    <h3 data-i18n="records.wipeTitle"></h3>
    <p><button class="ghost" id="wipeBtn" type="button" style="color:var(--crit)" data-i18n="records.wipe"></button></p>
  </div>
</section>

<!-- ═════════ 合作評估 · Collaborative Assessment Scale ═════════ -->
<section id="view-collab" class="hide">
  <div class="card" id="collabSetup">
    <h2 data-i18n="collab.title"></h2>
    <p class="muted" data-i18n-html="collab.body"></p>
    <h3 class="term-heading" id="collabGlossaryTitle" data-i18n="collab.glossaryTitle"></h3>
    <div class="term-grid" role="list" aria-labelledby="collabGlossaryTitle">
      <div class="term-card" role="listitem"><strong>Cyberballing</strong><span data-i18n="collab.termCyberballing"></span></div>
      <div class="term-card" role="listitem"><strong>stillfacing</strong><span data-i18n="collab.termStillfacing"></span></div>
      <div class="term-card" role="listitem"><strong>SIMIs</strong><span data-i18n="collab.termSIMIs"></span></div>
      <div class="term-card" role="listitem"><strong>CARRP</strong><span data-i18n="collab.termCARRP"></span></div>
    </div>
    <h3 data-i18n="collab.selectionTitle"></h3>
    <p class="tiny" data-i18n="collab.selectionHint"></p>
    <div class="chiprow" id="collabPeople"></div>
    <button class="chip" id="collabOther" type="button" aria-pressed="false" data-i18n="collab.other"></button>
    <p class="field-error hide" id="collabSelectionError" role="alert" data-i18n="collab.selectionRequired"></p>
    <div class="identity-panel hide" id="collabNameRow">
      <div class="field-coordinate" data-i18n="collab.nameCoordinate"></div>
      <div class="field-label-row">
        <label for="collabName" data-i18n="collab.nameLabel"></label>
        <span class="required-tag" data-i18n="form.required"></span>
      </div>
      <input type="text" id="collabName" maxlength="20" data-i18n-ph="collab.whoPh" autocomplete="off"
        aria-required="true" aria-describedby="collabNameHint collabNameError">
      <p class="tiny field-hint" id="collabNameHint" data-i18n="collab.nameHint"></p>
      <p class="field-error hide" id="collabNameError" role="alert" data-i18n="collab.nameRequired"></p>
    </div>
    <p><button class="primary" id="collabStartBtn" type="button" data-i18n="collab.start"></button></p>
  </div>

  <div class="card hide" id="collabQuiz">
    <p class="eyebrow" id="collabWho"></p>
    <p class="muted" data-i18n="collab.reminder"></p>
    <p class="tiny" id="collabQnum"></p>
    <div class="progress" aria-hidden="true"><div id="collabPbar"></div></div>
    <div class="question-stage" id="collabQuestionStage"><div id="collabItems"></div></div>
    <div class="likert5" id="collabScale"></div>
    <div class="scalelabel" id="collabScaleLabel" aria-live="polite">&nbsp;</div>
    <div class="anchors"><span data-i18n="collab.anchorLow"></span><span data-i18n="collab.anchorHigh"></span></div>
    <details class="quiz-glossary">
      <summary data-i18n="collab.glossaryToggle"></summary>
      <div class="term-grid" role="list">
        <div class="term-card" role="listitem"><strong>Cyberballing</strong><span data-i18n="collab.termCyberballing"></span></div>
        <div class="term-card" role="listitem"><strong>stillfacing</strong><span data-i18n="collab.termStillfacing"></span></div>
        <div class="term-card" role="listitem"><strong>SIMIs</strong><span data-i18n="collab.termSIMIs"></span></div>
        <div class="term-card" role="listitem"><strong>CARRP</strong><span data-i18n="collab.termCARRP"></span></div>
      </div>
    </details>
    <div class="quiznav">
      <button class="ghost" id="collabPrevBtn" type="button" data-i18n="collab.prev"></button>
      <button class="ghost" id="collabExitBtn" type="button" data-i18n="collab.exit"></button>
    </div>
  </div>

  <div class="card hide" id="collabResultCard">
    <div id="collabResult"></div>
  </div>
  <div class="card hide" id="collabHistoryCard">
    <div id="collabHistory"></div>
  </div>
</section>

<footer class="app" data-i18n-html="footer.html"></footer>
</div>

<dialog id="importDlg">
  <h2 style="margin-top:0;font-size:1.05rem" data-i18n="import.title"></h2>
  <p class="muted" id="importSummary"></p>
  <p>
    <button class="primary" id="importMerge" type="button" data-i18n="import.merge"></button>
    <button class="ghost" id="importReplace" type="button" data-i18n="import.replace"></button>
    <button class="ghost" id="importCancel" type="button" data-i18n="import.cancel"></button>
  </p>
</dialog>

<script src="js/i18n.js"></script>
<script src="js/scoring.js"></script>
<script src="js/store.js"></script>
<script src="js/chart.js"></script>
<script src="js/app.js"></script>
</body>
</html>
