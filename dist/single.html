   Design language: plotting your own coordinates in a quiet chart room.

*{box-sizing:border-box}
body{
  margin:0; background:var(--page); color:var(--ink-1);
  /* 方格紙 · the graph paper the whole room sits on */
  background-image:
    linear-gradient(var(--paper-line) 1px, transparent 1px),
    linear-gradient(90deg, var(--paper-line) 1px, transparent 1px);
  background-size:28px 28px;
  font-family:var(--sans);
  line-height:1.7; -webkit-font-smoothing:antialiased;
}
.wrap{max-width:860px;margin:0 auto;padding:16px 16px 96px}

/* ── 頁首：圖版標題欄 · header cartouche ── */
header.app{display:flex;align-items:baseline;gap:10px;flex-wrap:wrap;padding:20px 4px 6px}
header.app h1{font-family:var(--serif);font-size:1.5rem;font-weight:700;margin:0;letter-spacing:.05em}
header.app .sub{color:var(--ink-3);font-size:.75rem;letter-spacing:.14em}
#langBtn,#themeBtn{border:1px solid var(--ring);background:var(--surface-1);color:var(--ink-2);
  border-radius:6px;padding:4px 12px;font-size:.8rem;cursor:pointer}
#langBtn:hover,#themeBtn:hover{border-color:var(--accent);color:var(--accent)}
#langBtn{margin-left:auto;font-weight:700;min-width:44px}

/* ── 導覽：圖冊索引標籤 · index tabs ── */
nav.tabs{display:flex;gap:6px;overflow-x:auto;padding:12px 2px 0;position:sticky;top:0;z-index:5;
  background:var(--page);border-bottom:1px solid var(--ring)}
nav.tabs button{
  flex:0 0 auto;border:1px solid transparent;border-bottom:none;background:transparent;color:var(--ink-2);
  padding:9px 16px 11px;font-size:.95rem;cursor:pointer;white-space:nowrap;
  border-radius:6px 6px 0 0;font-family:var(--sans);
}
nav.tabs button:hover{color:var(--accent)}
nav.tabs button[aria-selected="true"]{
  color:var(--ink-1);font-weight:700;background:var(--surface-1);
  border-color:var(--ring);box-shadow:inset 0 2px 0 var(--accent);
}

/* ── 圖版 · plates (cards) ── */
.card{background:var(--surface-1);border:1px solid var(--ring);border-radius:6px;
  padding:22px 20px;margin:16px 0;position:relative}
/* 對位記號 · registration ticks at opposite corners */
.card::before,.card::after{content:"";position:absolute;width:12px;height:12px;pointer-events:none;
  border:0 solid var(--axis);opacity:.75}
.card::before{top:-5px;left:-5px;border-top-width:1px;border-left-width:1px}
.card::after{bottom:-5px;right:-5px;border-bottom-width:1px;border-right-width:1px}
.card h2{font-family:var(--serif);font-size:1.15rem;margin:0 0 8px;letter-spacing:.03em}
.card h3{font-size:.98rem;margin:16px 0 6px;font-weight:600}
.card.hero{padding:30px 24px 26px}
.eyebrow{margin:0 0 10px;font-size:.72rem;letter-spacing:.22em;color:var(--accent);font-weight:700;text-transform:uppercase}
.herotitle{font-family:var(--serif);font-size:1.7rem;line-height:1.45;margin:0 0 6px;text-wrap:balance;font-weight:700}
.muted{color:var(--ink-2);font-size:.92rem}
.tiny{color:var(--ink-3);font-size:.84rem}

/* ── 安全基地 hero 航線 · out from the base, and back ── */
.thread{display:block;width:100%;max-width:340px;height:56px;margin:14px 0 6px}
.thread .th-line{stroke:var(--accent);stroke-width:2;stroke-linecap:round;fill:none;
  stroke-dasharray:660;stroke-dashoffset:660;animation:th-draw 2.2s .35s cubic-bezier(.5,0,.3,1) forwards}
.thread .th-dot{fill:var(--accent)}
@keyframes th-draw{to{stroke-dashoffset:0}}

/* ── 按鈕 · buttons ── */
button{transition:transform .12s ease, background-color .15s ease, color .15s ease,
  border-color .15s ease, box-shadow .15s ease}
button.primary,.buttonlink.primary{
  background:var(--accent);color:var(--accent-ink);border:1px solid var(--accent);border-radius:8px;
  padding:12px 26px;font-size:1rem;font-weight:700;cursor:pointer;font-family:var(--sans);
}
button.primary:hover,.buttonlink.primary:hover{filter:brightness(1.07)}
button.ghost,.buttonlink.ghost{
  background:transparent;color:var(--ink-2);border:1px solid var(--ring);
  border-radius:8px;padding:10px 18px;font-size:.9rem;cursor:pointer;
}
button.ghost:hover,.buttonlink.ghost:hover{border-color:var(--accent);color:var(--accent)}
.buttonlink{display:inline-block;text-decoration:none;margin:4px 6px 4px 0;box-sizing:border-box}
.actionrow{display:flex;flex-wrap:wrap;gap:4px;margin:16px 0 0}
button:disabled{opacity:.4;cursor:not-allowed}
button.primary:active,.scale button:active,.likert5 button:active{transform:scale(.96)}
:focus-visible{outline:2px solid var(--accent);outline-offset:2px}

/* ── 選項標籤 · chips ── */
.chiprow{display:flex;flex-wrap:wrap;gap:8px;margin:8px 0}
.chip{border:1px solid var(--ring);background:var(--page);color:var(--ink-2);
  border-radius:6px;padding:8px 15px;font-size:.9rem;cursor:pointer}
.chip:hover{border-color:var(--accent);color:var(--accent)}
.chip[aria-pressed="true"]{background:var(--accent-soft);border-color:var(--accent);
  color:var(--ink-1);font-weight:600;box-shadow:inset 2px 0 0 var(--accent)}
input[type=text]{
  width:100%;padding:12px 14px;border-radius:8px;border:1px solid var(--ring);
  background:var(--page);color:var(--ink-1);font-size:1rem;font-family:var(--sans);
}
input[type=text]:focus{border-color:var(--accent);outline:none;box-shadow:0 0 0 3px var(--accent-soft)}

/* ── 作答：航線與測站 · plotted course & station marker ── */
.progress{height:2px;margin:16px 0 20px;position:relative;border-radius:0;
  background:repeating-linear-gradient(90deg, var(--axis) 0 6px, transparent 6px 12px)}
.progress>div{height:100%;background:var(--accent);transition:width .35s ease;position:relative}
.progress>div::after{
  content:"";position:absolute;right:-4px;top:50%;transform:translateY(-50%) rotate(45deg);
  width:8px;height:8px;background:var(--accent);
  box-shadow:0 0 0 3px var(--accent-soft);
}
.qtext{font-family:var(--serif);font-size:1.35rem;line-height:1.75;font-weight:600;
  min-height:4.6em;margin:10px 0 4px;text-wrap:balance}
.qanim{animation:fade-up .38s ease}
.scale{display:flex;align-items:center;justify-content:space-between;gap:2px;margin:18px 0 0}
.scale button,.likert5 button{
  flex:1;background:none;border:none;cursor:pointer;padding:0;border-radius:8px;
  display:flex;align-items:center;justify-content:center;
}
.scale button{height:60px}
.dotv{display:block;border-radius:50%;border:2px solid var(--axis);background:transparent;
  transition:border-color .15s ease, background-color .15s ease, transform .15s ease, box-shadow .15s ease}
.scale button:nth-child(1) .dotv{width:42px;height:42px}
.scale button:nth-child(2) .dotv{width:34px;height:34px}
.scale button:nth-child(3) .dotv{width:27px;height:27px}
.scale button:nth-child(4) .dotv{width:21px;height:21px}
.scale button:nth-child(5) .dotv{width:27px;height:27px}
.scale button:nth-child(6) .dotv{width:34px;height:34px}
.scale button:nth-child(7) .dotv{width:42px;height:42px}
.scale button:hover .dotv,.likert5 button:hover .dotv{border-color:var(--accent);background:var(--accent-soft)}
.scale button[aria-pressed="true"] .dotv,.likert5 button[aria-pressed="true"] .dotv{
  background:var(--accent);border-color:var(--accent);transform:scale(1.08);
  box-shadow:0 0 0 3px var(--accent-soft)}
.scale button:disabled{opacity:1;cursor:default}
.scalelabel{text-align:center;font-size:.88rem;color:var(--accent);font-weight:600;min-height:1.5em;margin:4px 0 0}
.anchors{display:flex;justify-content:space-between;font-size:.78rem;color:var(--ink-3)}
.quiznav{display:flex;justify-content:space-between;margin-top:20px;gap:10px}

/* ── 結果：座標讀數 · coordinate readouts ── */
.tiles{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin:12px 0}
.tile{background:var(--page);border:1px solid var(--ring);border-radius:8px;padding:12px 16px;
  position:relative;display:flex;flex-direction:column-reverse;gap:2px;
  box-shadow:inset 2px 0 0 var(--accent)}
.tile .v{font-size:1.9rem;font-weight:700;line-height:1.2;font-variant-numeric:tabular-nums}
.tile .l{font-size:.74rem;color:var(--ink-3);letter-spacing:.08em}
/* 風格印章 · the style stamp */
.badge{display:inline-block;padding:5px 15px;border-radius:6px;font-weight:700;font-size:1.02rem;
  background:transparent;color:var(--accent);border:1.5px solid var(--accent);
  font-family:var(--serif);letter-spacing:.08em;
  animation:badge-in .5s cubic-bezier(.2,.9,.3,1.2)}
.badge-sm{padding:1px 9px;font-size:.85rem;animation:none}
@keyframes badge-in{from{opacity:0;transform:scale(.7)}to{opacity:1;transform:scale(1)}}

/* ── 地形圖 · chart ── */
.chartbox{overflow-x:auto}
figure.viz{margin:8px 0}
figure.viz svg{display:block;max-width:100%;height:auto}
.legend{display:flex;flex-wrap:wrap;gap:8px;margin:10px 0 0}
.legend button{display:flex;align-items:center;gap:6px;border:1px solid var(--ring);border-radius:6px;
  background:var(--page);color:var(--ink-2);padding:5px 12px;font-size:.85rem;cursor:pointer}
.legend button:hover{border-color:var(--accent)}
.legend button[aria-pressed="false"]{opacity:.35}
.legend .dot{width:10px;height:10px;border-radius:50%;flex:0 0 auto}
.pointinfo{border:1px dashed var(--axis);border-radius:8px;padding:10px 14px;margin-top:10px;
  font-size:.9rem;color:var(--ink-2);background:var(--page)}

/* ── 紀錄 · records ── */
table{width:100%;border-collapse:collapse;font-size:.9rem}
th,td{text-align:left;padding:8px 8px;border-bottom:1px solid var(--grid);font-variant-numeric:tabular-nums}
th{color:var(--ink-3);font-weight:600;font-size:.74rem;letter-spacing:.1em}
tbody tr:hover td{background:var(--page)}
td .del{color:var(--crit);background:none;border:none;cursor:pointer;font-size:.85rem}
td .del:hover,h3 .del:hover{text-decoration:underline}
h3 .del{color:var(--crit);background:none;border:none;cursor:pointer;font-size:.85rem}

/* ── 檢核表 · checklist ── */
.likert5{display:flex;align-items:center;justify-content:space-between;gap:2px;margin:8px 0 0}
.likert5 button{height:48px}
.likert5 button:nth-child(1) .dotv{width:34px;height:34px}
.likert5 button:nth-child(2) .dotv{width:27px;height:27px}
.likert5 button:nth-child(3) .dotv{width:21px;height:21px}
.likert5 button:nth-child(4) .dotv{width:27px;height:27px}
.likert5 button:nth-child(5) .dotv{width:34px;height:34px}
.clitem{padding:13px 0;border-bottom:1px solid var(--grid)}
.clitem p{margin:0 0 4px;font-size:.95rem}

/* ── 其他 · misc ── */
dialog{border:1px solid var(--ring);border-radius:6px;background:var(--surface-1);color:var(--ink-1);max-width:420px;padding:22px}
dialog::backdrop{background:rgba(10,14,10,.55)}
dialog h2{font-family:var(--serif)}
.hide{display:none !important}
footer.app{margin-top:30px;color:var(--ink-3);font-size:.78rem;line-height:1.8;
  border-top:1px solid var(--ring);padding-top:16px}
a{color:var(--accent)}

/* ── 進場 · view entrance ── */
section{animation:fade-up .4s ease}
@keyframes fade-up{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}

@media (prefers-reduced-motion: reduce){
  *{transition:none !important;animation:none !important}
  .thread .th-line{stroke-dashoffset:0}
}
</style>

  "landing.body": "Imagine receiving a message from your partner: “Call me when you get this. We need to talk.” Do you expect good news, immediately fear that they are leaving, or become so unconcerned that you forget to reply? Levine uses this situation to show how the brain can read closeness and danger differently in each relationship.<br><br>The questionnaire records those responses on two dimensions: <strong>anxiety</strong>, how much you worry that someone does not care or may leave; and <strong>avoidance</strong>, how uncomfortable closeness and dependence make you. Assess several relationships separately and they become your attachment topography.",

/* 取字串 · translate */
function t(key){
  const d = I18N[LANG] || I18N.zh;
  return (key in d) ? d[key] : (I18N.zh[key] !== undefined ? I18N.zh[key] : key);
}
/* 帶參數 · with {placeholders} */
function tp(key, vars){
  let s = t(key);
  for(const k in vars) s = s.split("{"+k+"}").join(vars[k]);
  return s;
}
function setLang(lang){
  LANG = lang;
  try{ localStorage.setItem(LANG_KEY, lang); }catch(e){}
  document.documentElement.lang = t("html.lang");
}
/* 套用到帶 data-i18n 屬性的靜態元素 */
function applyI18n(){
  document.documentElement.lang = t("html.lang");
  document.title = t("app.title");
  document.querySelectorAll("[data-i18n]").forEach(el=>{ el.textContent = t(el.dataset.i18n); });
  document.querySelectorAll("[data-i18n-html]").forEach(el=>{ el.innerHTML = t(el.dataset.i18nHtml); });

}

<script>
"use strict";
/* ═══════════ 計分 · Scoring ═══════════
   兩維度模型（焦慮 × 迴避），計分公式見《Secure》pp.79–81：
   迴避 = 第 1–6 題平均（第 1–4 題反向計分）；焦慮 = 第 7–9 題平均。
   Two-dimension model (anxiety × avoidance), per the ECR-RS structure:
   avoidance = mean of Q1–6 (Q1–4 reverse-scored); anxiety = mean of Q7–9. */

/* 反向計分題（第 1–4 題）· reverse-scored items */
const REVERSED = [true, true, true, true, false, false, false, false, false];

function scoreAnswers(a){
  // a: 9 個 1–7 的作答 · nine 1–7 responses
  const adj = a.map((v,i)=> REVERSED[i] ? 8-v : v);
  const avoidance = adj.slice(0,6).reduce((x,y)=>x+y,0)/6;
  const anxiety   = adj.slice(6,9).reduce((x,y)=>x+y,0)/3;
  return {anxiety:+anxiety.toFixed(2), avoidance:+avoidance.toFixed(2)};
}

/* 象限判定（4 分為界）· quadrant, split at 4 */
function styleOf(anx, avd){
  if(anx<4 && avd<4)  return "secure";
  if(anx>=4 && avd<4) return "anxious";
  if(anx<4 && avd>=4) return "avoidant";
  return "fearful";
}

/* 《Secure》第 11 章合作關係評估量表分段 · Chapter 11 CAS bands */
function collabBand(total){
  if(total<=25) return "low";
  if(total<=50) return "mixed";
  if(total<60) return "high";
  return "strong";
}
</script>
<script>
"use strict";
/* ═══════════ 資料儲存 · Storage ═══════════
   localStorage 讀寫、資料正規化、匯入合併。
   localStorage persistence, normalisation, import merging. */

const LS_KEY = "attachment-topography-v1";
const SLOT_VARS = ["--s1","--s2","--s3","--s4","--s5","--s6","--s7","--s8"];

/* 舊版資料以中文儲存關係類別，轉換成 key · migrate legacy Chinese type labels */
const LEGACY_TYPES = {
  "一般依附風格":"general","伴侶":"partner","母親":"mother","父親":"father",
  "家人":"family","朋友":"friend","同事":"colleague","其他":"other",
};

let db = loadDb();

function loadDb(){
  try{
    const raw = localStorage.getItem(LS_KEY);
    if(raw){
      const d = JSON.parse(raw);
      if(d && Array.isArray(d.people)) return normalizeDb(d);
    }
  }catch(e){}
  return {version:1, people:[], collab:[]};
}
function saveDb(){ try{ localStorage.setItem(LS_KEY, JSON.stringify(db)); }catch(e){} }

function normalizeDb(d){
  d.version = 1;
  d.people = (d.people||[]).map((p,i)=>({
    id: p.id || uid(),
    name: String(p.name||"?").slice(0,20),
    type: REL_KEYS.includes(p.type) ? p.type : (LEGACY_TYPES[p.type] || "other"),
    slot: Number.isInteger(p.slot) ? p.slot : i % SLOT_VARS.length,
    results: (p.results||[]).filter(r=>typeof r.anxiety==="number" && typeof r.avoidance==="number")
      .map(r=>({date:r.date||new Date().toISOString(), answers:r.answers||[],
        anxiety:r.anxiety, avoidance:r.avoidance, style:r.style||styleOf(r.anxiety,r.avoidance)})),
  }));
  d.collab = (d.collab||[]).filter(c=>typeof c.total==="number");
  return d;
}

/* 匯入：合併（以 id 或名稱對應，補回未見過的紀錄）· import-merge */
function mergeDb(incoming){
  incoming.people.forEach(np=>{
    const mine = db.people.find(p=>p.id===np.id || p.name===np.name);
    if(!mine){
      np.slot = db.people.length % SLOT_VARS.length;
      db.people.push(np);
    }else{
      (np.results||[]).forEach(r=>{
        if(!mine.results.some(m=>m.date===r.date)) mine.results.push(r);
      });
      mine.results.sort((a,b)=>a.date.localeCompare(b.date));
    }
  });
  (incoming.collab||[]).forEach(c=>{
    if(!db.collab.some(m=>m.id===c.id)) db.collab.push(c);
  });
  db = normalizeDb(db);
  saveDb();
}
function replaceDb(incoming){ db = normalizeDb(incoming); saveDb(); }
function wipeDb(){ db = {version:1, people:[], collab:[]}; saveDb(); }
function dbStats(d){
  d = d || db;
  return {p:d.people.length, r:d.people.reduce((a,p)=>a+(p.results?p.results.length:0),0), c:(d.collab||[]).length};
}

/* ── 通用小工具 · small helpers ── */
function uid(){ return Date.now().toString(36)+Math.random().toString(36).slice(2,7); }
function fmtDate(iso){ const d=new Date(iso); return d.getFullYear()+"/"+(d.getMonth()+1)+"/"+d.getDate(); }
function stamp(){ const d=new Date(); return d.getFullYear()+String(d.getMonth()+1).padStart(2,"0")+String(d.getDate()).padStart(2,"0"); }
function esc(s){ return String(s).replace(/[&<>"']/g, c=>({"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#39;"}[c])); }
function downloadBlob(blob, filename){
  const a=document.createElement("a");
  a.href=URL.createObjectURL(blob);
  a.download=filename;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  setTimeout(()=>URL.revokeObjectURL(a.href), 3000);
}
</script>
<script>
"use strict";
/* ═══════════ 地形圖 · Topography chart (SVG) ═══════════
   四象限散點圖：橫軸焦慮、縱軸迴避，各 1–7 分，4 分為界。
   Quadrant scatter: x = anxiety, y = avoidance, 1–7, split at 4. */

const CHART_W = 560, CHART_H = 520;

function cssVar(n){ return getComputedStyle(document.documentElement).getPropertyValue(n).trim(); }
function slotColor(slot){ return cssVar(SLOT_VARS[slot % SLOT_VARS.length]) || "#2a78d6"; }

function buildChart(opt){
  opt = opt||{};
  const W=CHART_W, H=CHART_H, m={t:26, r:20, b:64, l:46};
  const iw=W-m.l-m.r, ih=H-m.t-m.b;
  const x=v=>m.l+(v-1)/6*iw, y=v=>m.t+ih-(v-1)/6*ih;
  const ink3=cssVar("--ink-3"), grid=cssVar("--grid"), axis=cssVar("--axis"),
        ink2=cssVar("--ink-2"), surface=cssVar("--surface-1");
  const NS="http://www.w3.org/2000/svg";
  const svg=document.createElementNS(NS,"svg");
  svg.setAttribute("viewBox","0 0 "+W+" "+H);
  svg.setAttribute("width",W); svg.setAttribute("height",H);
  svg.setAttribute("font-family","system-ui, -apple-system, 'PingFang HK', 'Microsoft JhengHei', sans-serif");
  svg.setAttribute("role","img");
  svg.setAttribute("aria-label", t("chart.aria"));
  function el(tag, attrs, text){
    const e=document.createElementNS(NS,tag);
    for(const k in attrs) e.setAttribute(k, attrs[k]);
    if(text!=null) e.textContent=text;
    svg.appendChild(e); return e;
  }
  // 格線 · gridlines
  for(let v=1; v<=7; v++){
    el("line",{x1:x(v),y1:m.t,x2:x(v),y2:m.t+ih,stroke:grid,"stroke-width":1});
    el("line",{x1:m.l,y1:y(v),x2:m.l+iw,y2:y(v),stroke:grid,"stroke-width":1});
    el("text",{x:x(v),y:m.t+ih+18,"text-anchor":"middle","font-size":12.5,fill:ink3}, v);
    el("text",{x:m.l-10,y:y(v)+4,"text-anchor":"end","font-size":12.5,fill:ink3}, v);
  }
  // 象限分界（4 分虛線）· quadrant split
  el("line",{x1:x(4),y1:m.t,x2:x(4),y2:m.t+ih,stroke:ink2,"stroke-width":1.5,"stroke-dasharray":"4 4"});
  el("line",{x1:m.l,y1:y(4),x2:m.l+iw,y2:y(4),stroke:ink2,"stroke-width":1.5,"stroke-dasharray":"4 4"});
  // 座標軸 · axes
  el("line",{x1:m.l,y1:m.t+ih,x2:m.l+iw,y2:m.t+ih,stroke:axis,"stroke-width":1.5});
  el("line",{x1:m.l,y1:m.t,x2:m.l,y2:m.t+ih,stroke:axis,"stroke-width":1.5});
  // 象限浮水印 · quadrant watermarks (serif, like chapter titles)
  const wm={"font-size":17,fill:ink3,opacity:.55,"text-anchor":"middle","font-weight":600,
    "font-family":"'Songti TC','Noto Serif TC','Songti SC',Georgia,serif"};
  el("text",Object.assign({x:x(2.5),y:y(2.4)},wm), t("chart.secure"));
  el("text",Object.assign({x:x(5.5),y:y(2.4)},wm), t("chart.anxious"));
  el("text",Object.assign({x:x(2.5),y:y(5.8)},wm), t("chart.avoidant"));
  el("text",Object.assign({x:x(5.5),y:y(5.8)},wm), t("chart.fearful"));
  // 軸標題 · axis titles
  el("text",{x:m.l+iw/2,y:H-26,"text-anchor":"middle","font-size":14,fill:ink2}, t("chart.xAxis"));
  const yl=el("text",{x:14,y:m.t+ih/2,"text-anchor":"middle","font-size":14,fill:ink2}, t("chart.yAxis"));
  yl.setAttribute("transform","rotate(-90 14 "+(m.t+ih/2)+")");
  el("text",{x:m.l+4,y:H-26,"font-size":12.5,fill:ink3}, t("chart.mostSecure"));

  // 資料點 · data points
  db.people.forEach(p=>{
    if(opt.hidden && opt.hidden.has(p.id)) return;
    if(!p.results.length) return;
    const c=slotColor(p.slot);
    const pts=p.results.map(r=>({cx:x(r.anxiety), cy:y(r.avoidance), r}));
    // 軌跡 · trajectory
    if(pts.length>1){
      const dstr="M"+pts.map(q=>q.cx.toFixed(1)+" "+q.cy.toFixed(1)).join(" L");
      el("path",{d:dstr,fill:"none",stroke:c,"stroke-width":2,opacity:.45});
    }
    pts.forEach((q,i)=>{
      const latest=i===pts.length-1;
      const dot=el("circle",{cx:q.cx,cy:q.cy,r:latest?7:4.5,fill:c,opacity:latest?1:.45,
        stroke:surface,"stroke-width":2,cursor:"pointer"});
      if(opt.onPoint) dot.addEventListener("click",()=>opt.onPoint(p,q.r));
      const tt=document.createElementNS(NS,"title");
      tt.textContent=p.name+" · "+fmtDate(q.r.date)+" · "+t("chart.tipAnx")+" "+q.r.anxiety.toFixed(2)+" / "+t("chart.tipAvd")+" "+q.r.avoidance.toFixed(2);
      dot.appendChild(tt);
      if(latest){
        const lx=Math.min(q.cx+10, m.l+iw-4);
        el("text",{x:lx,y:q.cy-10,"font-size":14,fill:cssVar("--ink-1"),"font-weight":600,
          "text-anchor": q.cx>m.l+iw-70?"end":"start",
          stroke:surface,"stroke-width":3,"paint-order":"stroke"}, p.name);
      }
    });
    // 高亮最新一筆 · highlight ring
    if(opt.highlight===p.id && pts.length){
      const q=pts[pts.length-1];
      el("circle",{cx:q.cx,cy:q.cy,r:12,fill:"none",stroke:c,"stroke-width":1.5,"stroke-dasharray":"2 3"});
    }
  });
  const fig=document.createElement("figure");
  fig.className="viz";
  fig.appendChild(svg);
  return fig;
}

/* 將 SVG 轉成 PNG 下載 · rasterise the map to a PNG download */
function exportChartPng(svg, onFail){
  const xml = new XMLSerializer().serializeToString(svg);
  const url = URL.createObjectURL(new Blob([xml], {type:"image/svg+xml;charset=utf-8"}));
  const img = new Image();
  img.onload = ()=>{
    const scale=2, headH=44, W=CHART_W, H=CHART_H;
    const c=document.createElement("canvas");
    c.width=W*scale; c.height=(H+headH)*scale;
    const ctx=c.getContext("2d");
    ctx.scale(scale,scale);
    ctx.fillStyle=cssVar("--surface-1")||"#fcfcfb";
    ctx.fillRect(0,0,W,H+headH);
    ctx.fillStyle=cssVar("--ink-1")||"#0b0b0b";
    ctx.font="600 16px system-ui, -apple-system, 'PingFang HK', sans-serif";
    ctx.fillText(t("chart.imgTitle"), 20, 27);
    const titleW=ctx.measureText(t("chart.imgTitle")).width;
    ctx.fillStyle=cssVar("--ink-3")||"#898781";
    ctx.font="11px system-ui, -apple-system, 'PingFang HK', sans-serif";
    ctx.fillText(fmtDate(new Date().toISOString())+" · "+t("chart.imgCredit"), 20+titleW+14, 27);
    ctx.drawImage(img, 0, headH, W, H);
    URL.revokeObjectURL(url);
    c.toBlob(b=>downloadBlob(b, "attachment-map-"+stamp()+".png"), "image/png");
  };
  img.onerror = ()=>{ URL.revokeObjectURL(url); onFail && onFail(); };
  img.src = url;
}
</script>
<script>
"use strict";
/* ═══════════ 主程式 · App (views, quiz flow, records, backup) ═══════════ */

/* ── 檢視切換 · view switching ── */
const VIEWS = ["landing","home","quiz","result","map","records","collab"];
let currentView = "landing";
function show(view){
  currentView = view;
  VIEWS.forEach(v=>document.getElementById("view-"+v).classList.toggle("hide", v!==view));
  document.querySelectorAll("nav.tabs button").forEach(b=>{
    const owns = b.dataset.view===view || (b.dataset.view==="home" && (view==="quiz"||view==="result"));
    b.setAttribute("aria-selected", owns?"true":"false");
  });
  if(view==="landing") renderLanding();
  if(view==="map") renderMap();
  if(view==="records"){ renderRecords(); renderDataStats(); }
  if(view==="home") renderHome();
  if(view==="collab") renderCollabHistory();
  window.scrollTo({top:0});
}
document.querySelectorAll("nav.tabs button").forEach(b=>b.addEventListener("click",()=>show(b.dataset.view)));
document.getElementById("homeLink").addEventListener("click",e=>{ e.preventDefault(); show("landing"); });
document.getElementById("landingStart").addEventListener("click",()=>show("home"));
document.getElementById("landingMap").addEventListener("click",()=>show("map"));
function renderLanding(){
  const has = db.people.some(p=>p.results.length);
  document.getElementById("landingMap").classList.toggle("hide", !has);
}

/* ── 語言切換 · language toggle ── */
document.getElementById("langBtn").addEventListener("click",()=>{
  setLang(LANG==="zh" ? "en" : "zh");
  refreshLang();
});
function refreshLang(){
  applyI18n();
  renderHome();
  renderCollabItems();
  renderDataStats();
  if(currentView==="quiz" && quiz) renderQuestion();
  else if(currentView==="result" && lastResult) renderResult(lastResult);
  else show(currentView);
}

/* ── 主題切換 · theme toggle ── */
document.getElementById("themeBtn").addEventListener("click",()=>{
  const r=document.documentElement;
  const dark = r.dataset.theme==="dark" || (!r.dataset.theme && matchMedia("(prefers-color-scheme: dark)").matches);
  r.dataset.theme = dark ? "light" : "dark";
  if(currentView==="map") renderMap();
  if(currentView==="result" && lastResult) renderResult(lastResult);
});

/* ── 測驗首頁 · quiz home ── */
let selType = "general", selExisting = null;
function renderHome(){
  const tr = document.getElementById("relTypes");
  tr.innerHTML = "";
  REL_KEYS.forEach(k=>{
    const b=document.createElement("button");
    b.type="button"; b.className="chip"; b.textContent=t("rel."+k);
    b.setAttribute("aria-pressed", k===selType && !selExisting ? "true":"false");
    b.addEventListener("click",()=>{ selType=k; selExisting=null;
      if(k==="general") document.getElementById("personName").value=t("rel.general.short");
      renderHome(); });
    tr.appendChild(b);
  });
  const ex = document.getElementById("existingPeople");
  const row = document.getElementById("existingRow");
  ex.innerHTML="";
  if(db.people.length){
    row.classList.remove("hide");
    db.people.forEach(p=>{
      const b=document.createElement("button");
      b.type="button"; b.className="chip";
      b.textContent = p.name+" · "+p.results.length+" "+t(p.results.length===1?"home.recordOne":"home.recordMany");
      b.setAttribute("aria-pressed", selExisting===p.id?"true":"false");
      b.addEventListener("click",()=>{ selExisting = selExisting===p.id?null:p.id; renderHome(); });
      ex.appendChild(b);
    });
  } else row.classList.add("hide");
}

/* ── 作答流程 · quiz flow ── */
let quiz = null, lastResult = null;
document.getElementById("startBtn").addEventListener("click",()=>{
  let person;
  if(selExisting){
    person = db.people.find(p=>p.id===selExisting);
  }else{
    const name = document.getElementById("personName").value.trim() ||
                 (selType==="general" ? t("rel.general.short") : t("rel."+selType));
    person = db.people.find(p=>p.name===name);
    if(!person){
      person = {id:uid(), name, type:selType, slot: db.people.length % SLOT_VARS.length, results:[]};
    }
  }
  quiz = {person, i:0, answers:Array(9).fill(0), isNew: !db.people.some(p=>p.id===person.id)};
  renderQuestion();
  show("quiz");
});
document.getElementById("quitBtn").addEventListener("click",()=>{ quiz=null; show("home"); });
document.getElementById("prevBtn").addEventListener("click",()=>{ if(quiz && quiz.i>0){ quiz.i--; renderQuestion(); } });

function renderQuestion(){
  // 一般依附風格用整體版題目與提示，避免「這個人」的矛盾
  const isGen = quiz.person.type==="general";
  document.getElementById("quizWho").textContent = isGen ? t("quiz.whoGeneral")
    : tp("quiz.who",{name:quiz.person.name, type:t("rel."+quiz.person.type)});
  document.getElementById("quizReminder").textContent = isGen ? t("quiz.generalReminder") : t("quiz.specificReminder");
  document.getElementById("qnum").textContent = tp("quiz.qnum",{n:quiz.i+1});
  const qt = document.getElementById("qtext");
  qt.textContent = (isGen ? t("questionsGeneral") : t("questions"))[quiz.i];
  qt.classList.remove("qanim"); void qt.offsetWidth; qt.classList.add("qanim");
  document.getElementById("pbar").style.width = ((quiz.i+1)/9*100)+"%";
  document.getElementById("prevBtn").disabled = quiz.i===0;
  const labels = t("scaleLabels");
  const lab = document.getElementById("scaleLabel");
  lab.textContent = quiz.answers[quiz.i] ? labels[quiz.answers[quiz.i]-1] : " ";
  const sc = document.getElementById("scale7");
  sc.innerHTML="";
  for(let v=1; v<=7; v++){
    const b=document.createElement("button");
    b.type="button";
    b.setAttribute("aria-label", v+" · "+labels[v-1]);
    b.setAttribute("aria-pressed", quiz.answers[quiz.i]===v?"true":"false");
    const d=document.createElement("span");
    d.className="dotv";
    b.appendChild(d);
    b.addEventListener("click",()=>{
      quiz.answers[quiz.i]=v;
      lab.textContent = labels[v-1];
      sc.querySelectorAll("button").forEach((bb,idx)=>{
        bb.setAttribute("aria-pressed", idx+1===v?"true":"false");
        bb.disabled = true; // 稍停讓選擇被看見，再前進
      });
      const at = quiz.i;
      setTimeout(()=>{
        if(!quiz || quiz.i!==at) return;
        if(quiz.i<8){ quiz.i++; renderQuestion(); }
        else finishQuiz();
      }, 260);
    });
    sc.appendChild(b);
  }
}

function finishQuiz(){
  const s = scoreAnswers(quiz.answers);
  const st = styleOf(s.anxiety, s.avoidance);
  const rec = {date:new Date().toISOString(), answers:quiz.answers.slice(), anxiety:s.anxiety, avoidance:s.avoidance, style:st};
  if(quiz.isNew) db.people.push(quiz.person);
  quiz.person.results.push(rec);
  saveDb();
  lastResult = {person:quiz.person, rec};
  quiz=null;
  renderResult(lastResult);
  show("result");
}

/* 風格標籤一律用同一種安靜的底色：名稱是資訊，顏色不該暗示嚴重程度 */

function renderResult({person, rec}){
  const st = t("styles")[rec.style];
  const isGen = person.type==="general";
  document.getElementById("resultCard").innerHTML =
    '<p class="tiny">'+esc(person.name)+"（"+t("rel."+person.type)+"）· "+fmtDate(rec.date)+"</p>"+
    "<h2>"+t(isGen?"result.styleIsGeneral":"result.styleIs")+'<span class="badge">'+st.name+"</span></h2>"+
    '<div class="tiles">'+
      '<div class="tile"><div class="v">'+rec.anxiety.toFixed(2)+'</div><div class="l">'+t("result.anxLabel")+"</div></div>"+
      '<div class="tile"><div class="v">'+rec.avoidance.toFixed(2)+'</div><div class="l">'+t("result.avdLabel")+"</div></div>"+
    "</div>"+
    '<p class="muted">'+t(isGen?"result.snapshotNoteGeneral":"result.snapshotNote")+"</p>"+
    "<p>"+((isGen && st.descGeneral) ? st.descGeneral : st.desc)+"</p><h3>"+t("result.promptTitle")+"</h3><p class='muted'>"+
    t(isGen?"result.promptGeneral":"result.promptSpecific")+"</p>"+
    (person.results.length>1 ? '<p class="tiny">'+tp("result.nth",{name:esc(person.name), n:person.results.length})+"</p>" : "");
  const box=document.getElementById("resultChart");
  box.innerHTML="";
  box.appendChild(buildChart({highlight:person.id}));
}
document.getElementById("toMapBtn").addEventListener("click",()=>show("map"));
document.getElementById("againBtn").addEventListener("click",()=>{ selExisting=null; show("home"); });

/* ── 地形圖 · map view ── */
const hiddenPeople = new Set();
function renderMap(){
  const lg=document.getElementById("legend");
  lg.innerHTML="";
  db.people.filter(p=>p.results.length).forEach(p=>{
    const b=document.createElement("button");
    b.type="button";
    b.setAttribute("aria-pressed", hiddenPeople.has(p.id)?"false":"true");
    const d=document.createElement("span");
    d.className="dot"; d.style.background=slotColor(p.slot);
    b.appendChild(d);
    b.appendChild(document.createTextNode(p.name));
    b.addEventListener("click",()=>{
      hiddenPeople.has(p.id)?hiddenPeople.delete(p.id):hiddenPeople.add(p.id);
      renderMap();
    });
    lg.appendChild(b);
  });
  const box=document.getElementById("mapChart");
  box.innerHTML="";
  if(db.people.some(p=>p.results.length)){
    box.appendChild(buildChart({hidden:hiddenPeople, onPoint:showPointInfo}));
  }else{
    box.innerHTML='<p class="muted">'+t("map.empty")+"</p>";
  }
  document.getElementById("pointInfo").classList.add("hide");
}
function showPointInfo(p, r){
  const el=document.getElementById("pointInfo");
  const st=t("styles")[r.style];
  el.classList.remove("hide");
  el.innerHTML="<strong>"+esc(p.name)+"</strong>（"+t("rel."+p.type)+"）· "+fmtDate(r.date)+
    ' <span class="badge badge-sm">'+st.name+"</span> "+
    t("th.anx")+" "+r.anxiety.toFixed(2)+"、"+t("th.avd")+" "+r.avoidance.toFixed(2);
}
document.getElementById("mapImgBtn").addEventListener("click",()=>{
  const svg = document.querySelector("#mapChart svg");
  if(!svg){ alert(t("map.noData")); return; }
  exportChartPng(svg, ()=>alert(t("map.imgFail")));
});

/* ── 紀錄 · records ── */
function renderRecords(){
  const box=document.getElementById("recordsBody");
  if(!db.people.length){ box.innerHTML='<p class="muted">'+t("records.empty")+"</p>"; return; }
  let h="";
  db.people.forEach(p=>{
    h+='<h3><span class="dot" style="display:inline-block;width:10px;height:10px;border-radius:50%;background:'+slotColor(p.slot)+'"></span> '+
       esc(p.name)+' <span class="tiny">（'+t("rel."+p.type)+'）</span> '+
       '<button class="del" data-delp="'+p.id+'">'+t("records.deletePerson")+"</button></h3>";
    if(p.results.length){
      h+="<table><thead><tr><th>"+t("th.date")+"</th><th>"+t("th.anx")+"</th><th>"+t("th.avd")+"</th><th>"+t("th.style")+"</th><th></th></tr></thead><tbody>";
      p.results.forEach((r,i)=>{
        h+="<tr><td>"+fmtDate(r.date)+"</td><td>"+r.anxiety.toFixed(2)+"</td><td>"+r.avoidance.toFixed(2)+
           "</td><td>"+t("styles")[r.style].name+'</td><td><button class="del" data-delp="'+p.id+'" data-delr="'+i+'">'+t("records.delete")+"</button></td></tr>";
      });
      h+="</tbody></table>";
    } else h+='<p class="tiny">'+t("records.none")+"</p>";
  });
  box.innerHTML=h;
  box.querySelectorAll("button.del").forEach(b=>b.addEventListener("click",()=>{
    const pid=b.dataset.delp, ri=b.dataset.delr;
    const p=db.people.find(q=>q.id===pid);
    if(!p) return;
    if(ri!=null){
      if(confirm(tp("records.confirmDelRec",{name:p.name, date:fmtDate(p.results[ri].date)}))){
        p.results.splice(+ri,1); saveDb(); renderRecords();
      }
    }else{
      if(confirm(tp("records.confirmDelPerson",{name:p.name, n:p.results.length}))){
        db.people=db.people.filter(q=>q.id!==pid); saveDb(); renderRecords();
      }
    }
  }));
}

/* ── 合作關係評估量表 · Collaborative Assessment Scale ── */
let collabAns = Array(15).fill(0);
function renderCollabItems(){
  const box=document.getElementById("collabItems");
  box.innerHTML="";
  const labels5 = t("scale5Labels");
  t("collabItems").forEach((txt,i)=>{
    const d=document.createElement("div");
    d.className="clitem";
    d.innerHTML="<p>"+(i+1)+". "+txt+"</p>";
    const row=document.createElement("div");
    row.className="likert5";
    for(let v=1; v<=5; v++){
      const b=document.createElement("button");
      b.type="button";
      b.setAttribute("aria-label", v+" · "+labels5[v-1]);
      b.setAttribute("aria-pressed", collabAns[i]===v?"true":"false");
      const dot=document.createElement("span");
      dot.className="dotv";
      b.appendChild(dot);
      b.addEventListener("click",()=>{
        collabAns[i]=v;
        row.querySelectorAll("button").forEach((bb,idx)=>bb.setAttribute("aria-pressed", idx+1===v?"true":"false"));
      });
      row.appendChild(b);
    }
    d.appendChild(row);
    const a=document.createElement("div");
    a.className="anchors";
    a.innerHTML="<span>"+t("collab.anchorLow")+"</span><span>"+t("collab.anchorHigh")+"</span>";
    d.appendChild(a);
    box.appendChild(d);
  });
}
document.getElementById("collabScoreBtn").addEventListener("click",()=>{
  if(collabAns.some(v=>!v)){ alert(t("collab.unanswered")); return; }
  const total=collabAns.reduce((a,b)=>a+b,0);
  const name=document.getElementById("collabName").value.trim()||t("collab.unnamed");
  db.collab.push({id:uid(), name, date:new Date().toISOString(), answers:collabAns.slice(), total});
  saveDb();
  const band=collabBand(total);
  const items=t("collabItems");
  const lows=collabAns.map((v,i)=>({v,i})).filter(q=>q.v<=3);
  let review;
  if(lows.length){
    review='<h3>'+t("collab.lowTitle")+'</h3><p class="muted">'+t("collab.lowIntro")+"</p><ul class='muted'>"+
      lows.map(q=>"<li>"+(q.i+1)+". "+items[q.i]+'（'+q.v+" / 5）</li>").join("")+"</ul>";
  }else{
    review='<p class="muted">'+t("collab.allHigh")+"</p>";
  }
  document.getElementById("collabResult").innerHTML=
    '<div class="tile" style="margin-top:14px"><div class="v">'+total+' <span class="tiny">/ 75</span></div>'+
    '<div class="l">'+tp("collab.resultLabel",{name:esc(name)})+"</div></div>"+
    '<h3>'+t("collab.band."+band+"Title")+'</h3><p class="muted">'+t("collab.band."+band+"Body")+"</p>"+
    review+
    '<p class="tiny">'+t("collab.discussion")+"</p>"+
    '<p class="tiny">'+t("collab.totalNote")+"</p>"+
    '<p><button class="ghost" id="collabClearBtn" type="button">'+t("collab.clear")+"</button></p>";
  document.getElementById("collabClearBtn").addEventListener("click",()=>{
    collabAns=Array(15).fill(0);
    document.getElementById("collabResult").innerHTML="";
    renderCollabItems();
  });
  renderCollabHistory();
});
function renderCollabHistory(){
  const box=document.getElementById("collabHistory");
  if(!db.collab.length){ box.innerHTML=""; return; }
  let h="<h3>"+t("collab.historyTitle")+"</h3><table><thead><tr><th>"+t("th.date")+"</th><th>"+t("th.person")+"</th><th>"+t("th.total")+"</th><th></th></tr></thead><tbody>";
  db.collab.forEach((c,i)=>{
    h+="<tr><td>"+fmtDate(c.date)+"</td><td>"+esc(c.name)+"</td><td>"+c.total+' / 75</td>'+
       '<td><button class="del" data-i="'+i+'">'+t("records.delete")+"</button></td></tr>";
  });
  h+="</tbody></table>";
  box.innerHTML=h;
  box.querySelectorAll("button.del").forEach(b=>b.addEventListener("click",()=>{
    if(confirm(t("collab.confirmDel"))){ db.collab.splice(+b.dataset.i,1); saveDb(); renderCollabHistory(); }
  }));
}

/* ── 匯出／匯入 · export / import ── */
document.getElementById("exportBtn").addEventListener("click",()=>{
  downloadBlob(new Blob([JSON.stringify(db,null,2)],{type:"application/json"}),
    "attachment-data-"+stamp()+".json");
});
let pendingImport=null;
document.getElementById("importBtn").addEventListener("click",()=>document.getElementById("importFile").click());
document.getElementById("importFile").addEventListener("change",e=>{
  const f=e.target.files[0];
  if(!f) return;
  const rd=new FileReader();
  rd.onload=()=>{
    try{
      const d=JSON.parse(rd.result);
      if(!d || !Array.isArray(d.people)) throw new Error("bad");
      d.collab=Array.isArray(d.collab)?d.collab:[];
      pendingImport=normalizeDb(d);
      const s=dbStats(pendingImport);
      document.getElementById("importSummary").textContent=tp("import.summary",s);
      document.getElementById("importDlg").showModal();
    }catch(err){ alert(t("import.bad")); }
    e.target.value="";
  };
  rd.readAsText(f);
});
document.getElementById("importCancel").addEventListener("click",()=>{ pendingImport=null; document.getElementById("importDlg").close(); });
document.getElementById("importReplace").addEventListener("click",()=>{
  if(pendingImport) replaceDb(pendingImport);
  finishImport();
});
document.getElementById("importMerge").addEventListener("click",()=>{
  if(pendingImport) mergeDb(pendingImport);
  finishImport();
});
function finishImport(){
  pendingImport=null;
  document.getElementById("importDlg").close();
  hiddenPeople.clear();
  renderDataStats(); renderHome();
  alert(t("import.done"));
}
function renderDataStats(){
  document.getElementById("dataStats").textContent=tp("records.stats", dbStats());
}
document.getElementById("wipeBtn").addEventListener("click",()=>{
  if(confirm(t("records.wipeConfirm1")) && confirm(t("records.wipeConfirm2"))){
    wipeDb(); hiddenPeople.clear();
    renderDataStats(); renderHome(); alert(t("records.wiped"));
  }
});

/* ── 啟動 · boot ── */
applyI18n();
renderLanding();
renderHome();
renderCollabItems();
renderDataStats();
</script>
